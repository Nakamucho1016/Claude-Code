<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}SNSで話題のトレンドをAIがわかりやすく解説する自動まとめサイト{% endblock %}">
  {% block ogp %}
  <meta property="og:title" content="{{ site_title }}">
  <meta property="og:description" content="SNSで話題のトレンドをAIがわかりやすく解説">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site_url }}">
  {% endblock %}
  <link rel="alternate" type="application/rss+xml" title="{{ site_title }}" href="{{ site_url }}/feed.xml">
  <link rel="stylesheet" href="{% block css_path %}/assets/style.css{% endblock %}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-logo"><a href="{% block home_path %}/{% endblock %}">{{ site_title }}</a></h1>
      <nav class="site-nav">
        <a href="{% block nav_home %}/{% endblock %}">ホーム</a>
        <a href="{% block nav_archive %}/archive.html{% endblock %}">アーカイブ</a>
        <a href="{% block nav_feed %}/feed.xml{% endblock %}">RSS</a>
        <button id="theme-toggle" aria-label="テーマ切替">🌓</button>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="ai-disclosure">
        本サイトの記事はAIが複数の公開情報源を要約して自動作成したコンテンツです。<br>
        内容の正確性は保証されません。詳細は各出典元をご確認ください。
      </p>
      <p class="copyright">&copy; {{ site_title }} — Powered by Claude AI</p>
    </div>
  </footer>

  <script>
    (function() {
      var toggle = document.getElementById('theme-toggle');
      var html = document.documentElement;
      var stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.setAttribute('data-theme', 'dark');
      }
      if (toggle) {
        toggle.addEventListener('click', function() {
          var current = html.getAttribute('data-theme');
          var next = current === 'dark' ? 'light' : 'dark';
          html.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
        });
      }
    })();
  </script>
</body>
</html>
